# Configuración de phpMyAdmin para Apache

# phpMyAdmin Configuration File
# Este archivo configura phpMyAdmin para Apache2

<Directory "/usr/share/phpmyadmin">
    AddDefaultCharset UTF-8

    <IfModule mod_authz_core.c>
        # Apache 2.4
        Require all granted
    </IfModule>
    <IfModule !mod_authz_core.c>
        # Apache 2.2
        Order allow,deny
        Allow from all
    </IfModule>
</Directory>

# Configuración específica para Railway
<Directory "/usr/share/phpmyadmin">
    # Permitir acceso desde cualquier host (para Railway)
    <IfModule mod_authz_core.c>
        Require all granted
    </IfModule>
    <IfModule !mod_authz_core.c>
        Order allow,deny
        Allow from all
    </IfModule>
</Directory>

# Configuración de SSL para Railway (opcional)
<IfModule mod_ssl.c>
    <Directory "/usr/share/phpmyadmin">
        SSLOptions +StrictRequire
        SSLVerifyClient optional
        SSLVerifyDepth 1
    </Directory>
</IfModule>

# Configuración de proxy inverso (si usas un proxy inverso)
<IfModule mod_proxy.c>
    <Location "/phpmyadmin">
        ProxyPass http://127.0.0.1/phpmyadmin
        ProxyPassReverse http://127.0.0.1/phpmyadmin
    </Location>
</IfModule>

# Configuración de autenticación (opcional)
# Si quieres proteger phpMyAdmin con autenticación HTTP:
# <Location "/phpmyadmin">
#     AuthType Basic
#     AuthName "phpMyAdmin Administration"
#     AuthUserFile /etc/phpmyadmin/htpasswd.users
#     Require valid-user
# </Location>

# Configuración de límite de tiempo (opcional)
<IfModule mod_limitipconn.c>
    # Limitar conexiones por IP
    <LimitExcept GET POST>
        LimitIPConn 10 30
    </LimitExcept>
</IfModule>

# Configuración de compresión (opcional)
<IfModule mod_deflate.c>
    <Location "/phpmyadmin">
        DeflateFilter "*.css *.js *.html *.php"
    </Location>
</IfModule>